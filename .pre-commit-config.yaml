repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests

  - repo: local
    hooks:
      - id: ruff-check-push
        name: ruff check (pre-push)
        entry: ruff check .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: ruff-format-check-push
        name: ruff format --check (pre-push)
        entry: ruff format --check .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: mypy-push
        name: mypy (pre-push)
        entry: mypy
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest-push
        name: pytest (pre-push)
        entry: pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
