name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          if ! echo "$PR_TITLE" | grep -qP '^(feat|fix|perf|refactor|docs|style|test|chore|ci|build)(\(.+\))?(!)?: .+'; then
            echo "ERROR: PR title must follow Conventional Commits format."
            echo "Examples: 'feat: add plugin registry', 'fix(broker): handle empty dataframe', 'feat!: breaking api change'"
            echo "See https://www.conventionalcommits.org"
            exit 1
          fi

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy -r requirements.txt

      - name: Lint and format check
        run: |
          ruff check .
          ruff format --check .

      - name: Type check
        run: mypy

      - name: Tests and coverage
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest --cov=. --cov-report=term-missing --cov-fail-under=80 tests/
